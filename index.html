<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Nature Scout: Plants, Animals, and Earth Materials</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css"
    />
    <script
      defer
      src="https://use.fontawesome.com/releases/v5.15.4/js/all.js"
    ></script>
    <link rel="stylesheet" href="styles.css" />
    <script src="content.js"></script>
  </head>
  <body>
    <!-- Start Screen -->
    <section id="start-screen" class="hero is-fullheight nature-start-screen">
      <div class="hero-body">
        <div class="container">
          <div class="nature-start-shell">
            <div class="nature-start-badge">
              <span class="icon is-large">
                <i class="fas fa-compass fa-3x"></i>
              </span>
            </div>
            <p class="nature-kicker">Outdoor Science Walk</p>
            <h1 class="title is-1 nature-start-title">Nature Scout</h1>
            <p class="subtitle is-4 nature-start-subtitle">
              1st Grade Plant and Rock Hunt
            </p>
            <button
              onclick="startGame()"
              class="button is-warning is-large nature-start-button btn-bounce"
            >
              <span class="icon"><i class="fas fa-shoe-prints"></i></span>
              <span>Start Walk</span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <div class="nature-background-orb nature-orb-one"></div>
    <div class="nature-background-orb nature-orb-two"></div>

    <!-- Main UI -->
    <div id="game-container" class="nature-app-shell hidden">
      <section class="section nature-app-section">
        <div class="container is-max-desktop nature-app-container">
          <header class="box nature-topbar">
            <div class="nature-topbar-brand">
              <span class="icon nature-topbar-icon">
                <i class="fas fa-seedling"></i>
              </span>
              <div>
                <h2 class="title is-5 mb-0 has-text-white">
                  First Grade Nature Scout
                </h2>
                <p class="nature-topbar-subtitle">Plant and Rock Hunt</p>
              </div>
            </div>
            <div id="progress-pills" class="tag is-success is-medium nature-progress">
              0 / 8 Found
            </div>
          </header>

          <main class="nature-stage">
            <section id="mission-view" class="nature-panel">
              <div id="photo-grid" class="nature-photo-grid">
                <!-- Cards injected here -->
              </div>
            </section>

            <div id="camera-view" class="hidden nature-camera-view">
              <div id="camera-instr-container" class="nature-camera-banner-wrap">
                <div class="nature-camera-banner">
                  <span class="nature-camera-banner-text">
                    <i class="fas fa-camera-retro"></i>
                    <span>Find: <span id="target-label"></span></span>
                  </span>
                  <button
                    onclick="speakCurrentTask()"
                    class="button is-small is-warning is-light is-rounded"
                  >
                    <span class="icon"><i class="fas fa-volume-up"></i></span>
                  </button>
                </div>
              </div>
              <video id="video-preview" autoplay playsinline></video>
              <div class="camera-overlay nature-camera-overlay">
                <div class="nature-camera-target"></div>
              </div>
              <div class="nature-camera-controls">
                <button
                  onclick="closeCamera()"
                  class="button is-danger is-rounded nature-camera-close btn-bounce"
                >
                  <span class="icon is-medium"><i class="fas fa-times fa-lg"></i></span>
                </button>
                <button
                  onclick="takePhoto()"
                  class="nature-camera-shutter btn-bounce"
                >
                  <span class="nature-camera-shutter-inner"></span>
                </button>
              </div>
            </div>
          </main>

          <footer class="box nature-footer">
            <span class="nature-footer-standard">LS.1.1 / ESS.1.2</span>
          </footer>
        </div>
      </section>
    </div>

    <!-- Success Modal -->
    <div id="property-modal" class="hidden nature-overlay">
      <div class="nature-dialog box">
        <div class="nature-dialog-header">
          <h3 class="title is-4 mb-0">
            <span class="icon has-text-info">
              <i class="fas fa-search"></i>
            </span>
            <span>Think About It!</span>
          </h3>
          <button
            onclick="speakPropertyQuestion()"
            class="button is-info is-light is-rounded"
          >
            <span class="icon"><i class="fas fa-volume-up"></i></span>
          </button>
        </div>
        <p id="property-question" class="nature-dialog-question">
          How does this material feel?
        </p>
        <div id="property-options" class="nature-option-grid"></div>
      </div>
    </div>

    <div id="success-modal" class="hidden nature-overlay nature-overlay-dark">
      <div class="nature-dialog box nature-success-dialog">
        <div class="nature-success-badge">
          <span class="icon is-large"><i class="fas fa-star"></i></span>
        </div>
        <div class="nature-dialog-header nature-dialog-header-center">
          <h3 class="title is-3 mb-0 has-text-success-dark">Science Fact!</h3>
          <button
            onclick="speakCurrentFact()"
            class="button is-success is-light is-rounded"
          >
            <span class="icon"><i class="fas fa-volume-up"></i></span>
          </button>
        </div>
        <div id="success-fact" class="nature-success-fact"></div>
        <button
          onclick="closeSuccess()"
          class="button is-success is-large is-fullwidth nature-success-button btn-bounce"
        >
          <span class="icon"><i class="fas fa-book-open"></i></span>
          <span>Add to Guide</span>
        </button>
      </div>
    </div>

    <canvas id="capture-canvas" class="hidden-canvas"></canvas>

    <script src="script.js"></script>
  </body>
</html>
